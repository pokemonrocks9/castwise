<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>CastWise — Free Fishing Intelligence</title>
  <meta name="description" content="Free solunar calendar, nearby lakes, fish activity and catch rate estimates. No subscription needed." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --green: #1D9E75;
      --green-light: #E1F5EE;
      --green-dark: #0F6E56;
      --green-mid: #085041;
      --blue-light: #E6F1FB;
      --blue-mid: #185FA5;
      --amber-light: #FAEEDA;
      --amber-dark: #854F0B;
      --red-light: #FCEBEB;
      --red-dark: #A32D2D;
      --lime-light: #EAF3DE;
      --lime-dark: #3B6D11;
      --gray-100: #F5F5F4;
      --gray-200: #E5E4E0;
      --gray-400: #A8A8A0;
      --gray-600: #5F5E5A;
      --gray-800: #2C2C2A;
      --bg: #ffffff;
      --bg2: #F7F6F3;
      --border: rgba(0,0,0,0.1);
      --border2: rgba(0,0,0,0.18);
      --text: #1a1a18;
      --text2: #5a5a54;
      --text3: #9a9990;
      --radius: 10px;
      --radius-lg: 14px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a18;
        --bg2: #222220;
        --border: rgba(255,255,255,0.1);
        --border2: rgba(255,255,255,0.18);
        --text: #f0ede8;
        --text2: #a8a49e;
        --text3: #6a6760;
        --gray-100: #2a2a28;
        --green-light: #0d3d2e;
        --blue-light: #0d2440;
        --amber-light: #3a2a0a;
        --red-light: #3a1818;
        --lime-light: #1a2e0a;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    a { color: var(--green); }

    /* ── Layout ── */
    .app { max-width: 520px; margin: 0 auto; padding: 20px 16px 60px; }

    /* ── Header ── */
    .header { margin-bottom: 20px; }
    .logo { font-family: 'DM Serif Display', serif; font-size: 28px; line-height: 1; }
    .logo span { color: var(--green); }
    .tagline { font-size: 13px; color: var(--text3); margin-top: 3px; }

    /* ── Location bar ── */
    .loc-wrap { display: flex; gap: 8px; margin-bottom: 20px; }
    .loc-bar {
      flex: 1; display: flex; align-items: center; gap: 8px;
      background: var(--bg2); border: 1px solid var(--border2);
      border-radius: var(--radius); padding: 10px 14px;
    }
    .loc-bar input {
      flex: 1; background: transparent; border: none; outline: none;
      font-size: 15px; color: var(--text); font-family: 'DM Sans', sans-serif;
    }
    .loc-bar input::placeholder { color: var(--text3); }
    .loc-icon { width: 16px; height: 16px; flex-shrink: 0; color: var(--text3); }
    .btn {
      background: var(--bg2); border: 1px solid var(--border2);
      border-radius: var(--radius); padding: 10px 14px;
      font-size: 13px; font-weight: 500; color: var(--text2);
      cursor: pointer; white-space: nowrap; font-family: 'DM Sans', sans-serif;
      transition: background .15s, color .15s;
    }
    .btn:hover { background: var(--gray-100); color: var(--text); }
    .btn-primary { background: var(--green); color: #fff; border-color: var(--green); }
    .btn-primary:hover { background: var(--green-dark); }

    /* ── Section label ── */
    .section-label {
      font-size: 11px; font-weight: 500; text-transform: uppercase;
      letter-spacing: .08em; color: var(--text3); margin-bottom: 10px;
    }

    /* ── Day scroll ── */
    .day-scroll-wrap { position: relative; margin-bottom: 24px; }
    .day-scroll-wrap::before,
    .day-scroll-wrap::after {
      content: ''; position: absolute; top: 0; bottom: 4px;
      width: 48px; pointer-events: none; z-index: 1;
      opacity: 0; transition: opacity .2s;
    }
    .day-scroll-wrap::before {
      left: 0;
      background: linear-gradient(to left, transparent, var(--bg));
    }
    .day-scroll-wrap::after {
      right: 0;
      background: linear-gradient(to right, transparent, var(--bg));
    }
    .day-scroll-wrap.fade-right::after  { opacity: 1; }
    .day-scroll-wrap.fade-left::before  { opacity: 1; }
    .day-scroll {
      display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px;
      scrollbar-width: none; -webkit-overflow-scrolling: touch;
      overscroll-behavior-x: contain; white-space: nowrap;
    }
    .day-scroll::-webkit-scrollbar { display: none; }
    .day-card {
      flex: 0 0 76px; flex-shrink: 0; border-radius: var(--radius); border: 1px solid var(--border);
      background: var(--bg2); padding: 12px 8px; text-align: center; cursor: pointer;
      transition: border-color .15s, background .15s; user-select: none;
      -webkit-tap-highlight-color: transparent; display: inline-flex;
      flex-direction: column; align-items: center; vertical-align: top;
    }
    .day-card.active { border-color: var(--green); background: var(--bg); }
    .day-name { font-size: 11px; color: var(--text3); margin-bottom: 5px; }
    .day-score { font-size: 22px; font-weight: 500; line-height: 1; margin-bottom: 5px; }
    .day-lbl {
      font-size: 10px; border-radius: 4px; padding: 2px 5px;
      font-weight: 500; display: inline-block;
    }
    .lbl-excellent { background: var(--green-light); color: var(--green-dark); }
    .lbl-good      { background: var(--lime-light);  color: var(--lime-dark); }
    .lbl-fair      { background: var(--amber-light); color: var(--amber-dark); }
    .lbl-poor      { background: var(--red-light);   color: var(--red-dark); }

    /* ── Cards ── */
    .card {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 18px; margin-bottom: 16px;
    }
    .card-title { font-size: 15px; font-weight: 500; margin-bottom: 14px; }

    /* ── Solunar ── */
    .sol-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
    .sol-item {
      background: var(--bg2); border-radius: var(--radius);
      padding: 12px; text-align: center;
    }
    .sol-type { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
    .sol-time { font-size: 17px; font-weight: 500; }
    .sol-dur  { font-size: 11px; color: var(--green); margin-top: 3px; }

    /* ── Moon row ── */
    .moon-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px; background: var(--bg2); border-radius: var(--radius); margin-top: 4px;
    }
    .moon-em { font-size: 26px; width: 34px; text-align: center; line-height: 1; }
    .moon-name { font-size: 14px; font-weight: 500; }
    .moon-illum { font-size: 12px; color: var(--text2); margin-top: 2px; }

    /* ── Weather chips ── */
    .wx-row { display: flex; gap: 8px; margin-top: 12px; }
    .wx-chip {
      flex: 1; background: var(--bg2); border-radius: var(--radius);
      padding: 10px 8px; text-align: center;
    }
    .wx-val { font-size: 18px; font-weight: 500; line-height: 1.2; }
    .wx-lbl { font-size: 11px; color: var(--text3); margin-top: 3px; }

    /* ── Hourly timeline ── */
    .hour-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; border-top: 1px solid var(--border); }
    .hour-time { font-size: 12px; color: var(--text3); width: 42px; flex-shrink: 0; }
    .hbar-track { flex: 1; background: var(--bg2); border-radius: 4px; height: 7px; overflow: hidden; }
    .hbar-fill  { height: 100%; border-radius: 4px; transition: width .3s ease; }
    .hour-pk { font-size: 11px; color: var(--green); font-weight: 500; width: 38px; text-align: right; flex-shrink: 0; }

    /* ── Fish cards ── */
    .fish-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .fish-card { background: var(--bg2); border-radius: var(--radius); padding: 12px; }
    .fish-name { font-size: 13px; font-weight: 500; margin-bottom: 3px; }
    .fish-sub  { font-size: 11px; color: var(--text3); margin-bottom: 8px; }
    .fish-track { background: var(--bg); border-radius: 3px; height: 5px; overflow: hidden; }
    .fish-fill  { height: 100%; border-radius: 3px; background: var(--green); }
    .fish-pct   { font-size: 11px; color: var(--green); font-weight: 500; margin-top: 4px; }

    /* ── Lakes ── */
    .lake-item {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 14px;
      margin-bottom: 10px;
    }
    .lake-header { display: flex; gap: 12px; align-items: flex-start; }
    .lake-ico {
      width: 38px; height: 38px; border-radius: var(--radius);
      background: var(--green-light); display: flex; align-items: center;
      justify-content: center; font-size: 20px; flex-shrink: 0;
    }
    .lake-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .lake-dist { font-size: 12px; color: var(--text2); margin: 3px 0 8px; }
    .tags { display: flex; flex-wrap: wrap; gap: 5px; }
    .tag { font-size: 11px; padding: 3px 8px; border-radius: 4px; font-weight: 500; }
    .tag-fish   { background: var(--blue-light);  color: var(--blue-mid); }
    .tag-low    { background: var(--green-light); color: var(--green-dark); }
    .tag-med    { background: var(--amber-light); color: var(--amber-dark); }
    .tag-high   { background: var(--red-light);   color: var(--red-dark); }
    .tag-catch  { background: var(--lime-light);  color: var(--lime-dark); }

    /* ── iNat fish section ── */
    .fish-toggle {
      margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; cursor: pointer;
    }
    .fish-toggle-label { font-size: 13px; font-weight: 500; color: var(--text2); }
    .fish-toggle-arrow { font-size: 11px; color: var(--text3); transition: transform .2s; }
    .fish-toggle.open .fish-toggle-arrow { transform: rotate(180deg); }
    .inat-fish-list { margin-top: 10px; display: none; flex-direction: column; gap: 8px; }
    .inat-fish-list.open { display: flex; }
    .inat-loading { font-size: 13px; color: var(--text3); text-align: center; padding: 12px 0; }
    .inat-fish-row {
      display: flex; align-items: center; gap: 10px;
      background: var(--bg2); border-radius: var(--radius); padding: 8px 10px;
    }
    .inat-fish-photo {
      width: 40px; height: 40px; border-radius: 6px; object-fit: cover;
      flex-shrink: 0; background: var(--border);
    }
    .inat-fish-photo-placeholder {
      width: 40px; height: 40px; border-radius: 6px; flex-shrink: 0;
      background: var(--green-light); display: flex; align-items: center;
      justify-content: center; font-size: 20px;
    }
    .inat-fish-info { flex: 1; min-width: 0; }
    .inat-fish-common { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .inat-fish-sci { font-size: 11px; color: var(--text3); font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .inat-fish-count { font-size: 12px; color: var(--green); font-weight: 500; flex-shrink: 0; }
    .inat-source { font-size: 11px; color: var(--text3); margin-top: 8px; text-align: right; }
    .inat-source a { color: var(--text3); }
    .inat-fallback-note { font-size: 11px; color: var(--text3); margin-top: 6px; font-style: italic; }

    /* ── States ── */
    .loading { text-align: center; padding: 48px 20px; color: var(--text3); font-size: 14px; }
    .loading .spinner {
      width: 28px; height: 28px; border: 2px solid var(--border2);
      border-top-color: var(--green); border-radius: 50%;
      animation: spin .7s linear infinite; margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .err-msg {
      background: var(--red-light); border: 1px solid rgba(162,45,45,.2);
      border-radius: var(--radius); padding: 14px; font-size: 13px;
      color: var(--red-dark); margin-bottom: 16px;
    }
    .empty { text-align: center; padding: 28px; color: var(--text3); font-size: 13px; }

    /* ── Lake filter bar ── */
    .lake-filter-bar { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
    .filter-btn {
      font-size: 12px; font-weight: 500; padding: 6px 14px;
      border-radius: 20px; border: 1px solid var(--border2);
      background: var(--bg2); color: var(--text2); cursor: pointer;
      transition: background .15s, color .15s, border-color .15s;
      font-family: 'DM Sans', sans-serif;
    }
    .filter-btn.active { background: var(--green); color: #fff; border-color: var(--green); }

    /* ── Lake DB cards ── */
    .db-section { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
    .db-card { background: var(--bg2); border-radius: var(--radius); padding: 12px; margin-bottom: 8px; }
    .db-card.db-empty { border: 1px dashed var(--border2); background: transparent; }
    .db-card-header { font-size: 12px; font-weight: 500; color: var(--text3); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
    .db-badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 500; }
    .db-confirmed   { background: var(--green-light); color: var(--green-dark); }
    .db-unconfirmed { background: var(--amber-light); color: var(--amber-dark); }
    .db-row { font-size: 13px; padding: 3px 0; color: var(--text); }
    .db-notes { font-size: 12px; color: var(--text2); margin-top: 6px; font-style: italic; }
    .db-meta  { font-size: 11px; color: var(--text3); margin-top: 6px; }
    .db-empty-text { font-size: 13px; color: var(--text2); margin-bottom: 8px; }
    .db-pending-notice {
      margin-top: 8px; padding: 8px 10px; background: var(--amber-light);
      border-radius: var(--radius); font-size: 12px; color: var(--amber-dark);
      display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap;
    }
    .db-vote-btn {
      font-size: 11px; font-weight: 500; background: var(--amber-dark); color: #fff;
      border: none; border-radius: 4px; padding: 4px 10px; cursor: pointer;
    }
    .db-edit-btn {
      margin-top: 8px; font-size: 12px; font-weight: 500; color: var(--green);
      background: none; border: 1px solid var(--green); border-radius: 4px;
      padding: 5px 12px; cursor: pointer; width: 100%;
    }
    .db-edit-btn:hover { background: var(--green-light); }
    .db-form-wrap { }
    .db-form { background: var(--bg2); border-radius: var(--radius); padding: 12px; margin-bottom: 8px; }
    .db-form-title { font-size: 13px; font-weight: 500; margin-bottom: 10px; }
    .db-label { display: flex; flex-direction: column; gap: 4px; font-size: 12px; color: var(--text2); margin-bottom: 8px; }
    .db-label select, .db-label input {
      font-size: 13px; padding: 7px 10px; border-radius: var(--radius);
      border: 1px solid var(--border2); background: var(--bg);
      color: var(--text); font-family: 'DM Sans', sans-serif; outline: none;
    }
    .db-submit-btn {
      width: 100%; padding: 9px; background: var(--green); color: #fff;
      border: none; border-radius: var(--radius); font-size: 13px;
      font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif;
      margin-top: 4px;
    }
    .db-submit-btn:disabled { opacity: .6; cursor: default; }
    .db-form-status { font-size: 12px; margin-top: 6px; min-height: 16px; color: var(--text2); }
    .db-form-section { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: .06em; color: var(--text3); margin: 14px 0 8px; padding-top: 12px; border-top: 1px solid var(--border); }
    .db-form-section:first-of-type { margin-top: 4px; border-top: none; }
    .db-form-subsection { font-size: 11px; color: var(--text3); margin: 8px 0 4px; }
    .db-price-row, .db-rental-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; font-size: 13px; flex-wrap: wrap; }
    .db-price-amt { width: 72px; padding: 5px 8px; border-radius: var(--radius); border: 1px solid var(--border2); background: var(--bg); color: var(--text); font-size: 13px; font-family: 'DM Sans', sans-serif; }
    .db-price-per { padding: 5px 6px; border-radius: var(--radius); border: 1px solid var(--border2); background: var(--bg); color: var(--text); font-size: 13px; font-family: 'DM Sans', sans-serif; }
    .db-rental-type { padding: 5px 6px; border-radius: var(--radius); border: 1px solid var(--border2); background: var(--bg); color: var(--text); font-size: 13px; font-family: 'DM Sans', sans-serif; }
    .db-add-btn { font-size: 12px; color: var(--green); background: none; border: 1px dashed var(--green); border-radius: 4px; padding: 4px 10px; cursor: pointer; margin-bottom: 4px; }
    .db-hours-row { background: var(--bg2); border-radius: var(--radius); padding: 10px; margin-bottom: 8px; }
    .db-hours-row-inner { display: flex; flex-direction: column; gap: 4px; }
    .hours-time-fields { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
    .db-time-input { padding: 5px 8px; border-radius: var(--radius); border: 1px solid var(--border2); background: var(--bg); color: var(--text); font-size: 13px; font-family: 'DM Sans', sans-serif; width: 110px; }
    .db-hours-dates { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
    .db-month-sel, .db-day-sel { padding: 5px 4px; border-radius: var(--radius); border: 1px solid var(--border2); background: var(--bg); color: var(--text); font-size: 13px; font-family: 'DM Sans', sans-serif; }
    .db-month-sel { width: 70px; }
    .db-day-sel   { width: 58px; }
    .db-days-grid { display: flex; gap: 6px; flex-wrap: wrap; }
    .db-day-label { display: flex; align-items: center; gap: 4px; font-size: 13px; cursor: pointer; }
    .db-hours-closed { color: var(--red-dark) !important; }
    .db-remove-btn { font-size: 11px; color: var(--red-dark); background: none; border: none; cursor: pointer; padding: 2px 4px; }

    /* ── Footer ── */
    .footer { margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border); text-align: center; font-size: 12px; color: var(--text3); }
    .footer a { color: var(--text3); }

    /* ── Responsive ── */
    @media (max-width: 420px) {
      .app { padding: 16px 12px 48px; }
      .fish-grid { grid-template-columns: 1fr 1fr; }
      .day-card { flex: 0 0 68px; }
    }
  </style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="logo">Cast<span>Wise</span></div>
    <div class="tagline">Free fishing intelligence — no subscription ever</div>
  </div>

  <div class="loc-wrap">
    <div class="loc-bar">
      <svg class="loc-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="8" cy="7" r="3"/><path d="M8 2C5.24 2 3 4.24 3 7c0 4 5 8 5 8s5-4 5-8c0-2.76-2.24-5-5-5z"/>
      </svg>
      <input type="text" id="locIn" placeholder="City, state or zip — press Enter" autocomplete="off" />
    </div>
    <button class="btn" id="btnGPS">📍 GPS</button>
  </div>

  <div id="content">
    <div class="loading">
      <div class="spinner"></div>
      Loading your local fishing forecast…
    </div>
  </div>

  <div class="footer">
    <p>Weather via <a href="https://open-meteo.com" target="_blank">Open-Meteo</a> · Lakes via <a href="https://www.openstreetmap.org" target="_blank">OpenStreetMap</a> · Solunar math is calculated locally</p>
    <p style="margin-top:6px">Built with CastWise · <a href="https://github.com" target="_blank">View source</a></p>
    <p style="margin-top:10px;font-size:10px;opacity:0.4">v0.15.0</p>
  </div>

</div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
// Replace with your deployed Cloudflare Worker URL after `wrangler deploy`
const WORKER_URL = 'https://castwise-worker.tytygoins.workers.dev';

// ── Lake database cache (loaded from worker on startup) ───────────────────────
let lakeDB = {};
async function loadLakeDB() {
  try {
    const res = await fetch(`${WORKER_URL}/db`, { signal: AbortSignal.timeout(5000) });
    if (res.ok) lakeDB = await res.json();
  } catch { /* non-fatal — app works without it */ }
}

// ── Fish database ──────────────────────────────────────────────────────────────
const FISH = [
  { name: 'Largemouth Bass', peak: [4,5,6,9,10],     tr: [60,85], base: 0.45 },
  { name: 'Crappie',         peak: [3,4,5,10,11],    tr: [55,75], base: 0.55 },
  { name: 'Catfish',         peak: [5,6,7,8,9],      tr: [65,85], base: 0.40 },
  { name: 'Bluegill',        peak: [5,6,7,8],        tr: [65,85], base: 0.60 },
  { name: 'Rainbow Trout',   peak: [3,4,5,10,11,12], tr: [45,65], base: 0.38 },
  { name: 'Walleye',         peak: [4,5,6,9,10,11],  tr: [55,72], base: 0.35 },
  { name: 'Yellow Perch',    peak: [4,5,10,11],      tr: [55,72], base: 0.50 },
  { name: 'Common Carp',     peak: [5,6,7,8,9],      tr: [60,80], base: 0.42 },
];

// ── Moon phase ─────────────────────────────────────────────────────────────────
function moonPhase(date) {
  const cycle = 29.53058867;
  const phase = (((date - new Date(2000,0,6)) / 864e5 % cycle) + cycle) % cycle;
  const p = phase / cycle;
  const i = p<0.03||p>0.97 ? 0 : p<0.22 ? 1 : p<0.28 ? 2 : p<0.47 ? 3
            : p<0.53 ? 4 : p<0.72 ? 5 : p<0.78 ? 6 : 7;
  return {
    name:  ['New Moon','Waxing Crescent','First Quarter','Waxing Gibbous','Full Moon','Waning Gibbous','Last Quarter','Waning Crescent'][i],
    icon:  ['🌑','🌒','🌓','🌔','🌕','🌖','🌗','🌘'][i],
    illum: Math.round(Math.abs(Math.cos(p * 2 * Math.PI)) * 100),
    phase,
  };
}

// ── Sunrise / sunset (Spencer equation) ───────────────────────────────────────
function sunTimes(lat, lon, date) {
  const r = Math.PI / 180;
  const day = Math.floor((date - new Date(date.getFullYear(), 0, 0)) / 864e5);
  const B   = (360/365) * (day - 81) * r;
  const eot = 9.87*Math.sin(2*B) - 7.53*Math.cos(B) - 1.5*Math.sin(B);
  const tcf  = 4 * lon + eot;
  const decl = 23.45 * Math.sin(r * (360/365) * (day - 81)) * r;
  const ha   = Math.acos(-Math.tan(lat*r) * Math.tan(decl)) / r;
  return { rise: 12 - ha/15 - tcf/60, set: 12 + ha/15 - tcf/60 };
}

// ── Solunar windows ───────────────────────────────────────────────────────────
function solunarWindows(lat, lon, date) {
  const { phase } = moonPhase(date);
  const ld = 24.8;
  const off = (phase / 29.53) * ld;
  const m1 = (off % ld) - 12, m2 = m1 + 12.4;
  const n1 = m1 + 6.2,       n2 = n1 + 12.4;
  const fmt = h => {
    const a = ((h % 24) + 24) % 24, hr = Math.floor(a);
    const mn = Math.round((a - hr) * 60);
    const ap = hr >= 12 ? 'PM' : 'AM';
    const dh = hr > 12 ? hr-12 : hr === 0 ? 12 : hr;
    return `${dh}:${String(mn).padStart(2,'0')} ${ap}`;
  };
  return [
    { type:'Major', time:fmt(m1+12), hour:((m1+12+24)%24), dur:'2 hr window' },
    { type:'Major', time:fmt(m2+12), hour:((m2+12+24)%24), dur:'2 hr window' },
    { type:'Minor', time:fmt(n1+12), hour:((n1+12+24)%24), dur:'1 hr window' },
    { type:'Minor', time:fmt(n2+12), hour:((n2+12+24)%24), dur:'1 hr window' },
  ];
}

// ── Solunar score (0–100) ─────────────────────────────────────────────────────
function calcScore(date, wcode, wind, moon) {
  let s = 50;
  const il = moon.illum;
  if (il > 90 || il < 5)   s += 20;
  else if (il > 70 || il < 15) s += 12;
  else if (il > 50)         s += 6;
  if (wcode <= 3)  s += 15;
  else if (wcode <= 51) s += 5;
  else if (wcode >= 71) s -= 15;
  if (wind < 10) s += 10;
  else if (wind > 20) s -= 10;
  if (date.getDay() === 0 || date.getDay() === 6) s += 3;
  return Math.min(100, Math.max(5, s));
}

function scoreLabel(s) {
  return s >= 78 ? 'excellent' : s >= 58 ? 'good' : s >= 38 ? 'fair' : 'poor';
}

// ── Crowd heuristic ───────────────────────────────────────────────────────────
function crowdEstimate(sc, dow, wc) {
  let c = (dow === 0 || dow === 6) ? 35 : 10;
  if (wc <= 3) c += 20; else if (wc >= 61) c -= 10;
  if (sc >= 75) c += 15;
  c = Math.min(95, Math.max(5, c));
  return c > 60 ? { text:'busy',     cls:'tag-high' }
       : c > 35 ? { text:'moderate', cls:'tag-med'  }
       :           { text:'quiet',    cls:'tag-low'  };
}

// ── Fish activity rates ───────────────────────────────────────────────────────
function fishRates(month, tempF, wc, sc) {
  return FISH.map(f => {
    let r = f.base;
    if (f.peak.includes(month)) r += 0.20;
    if (tempF >= f.tr[0] && tempF <= f.tr[1])        r += 0.15;
    else if (tempF < f.tr[0]-15 || tempF > f.tr[1]+15) r -= 0.15;
    if (wc <= 3) r += 0.05;
    r += (sc - 50) / 100 * 0.15;
    return { ...f, rate: Math.min(0.95, Math.max(0.02, r)) };
  }).sort((a,b) => b.rate - a.rate).slice(0, 6);
}

// ── Hourly activity ───────────────────────────────────────────────────────────
function hourlyActivity(windows, rise, set) {
  return Array.from({ length: 19 }, (_, i) => {
    const h = i + 4;
    let a = 20;
    if (Math.abs(h - rise) < 1.5) a += 40;
    if (Math.abs(h - set)  < 1.5) a += 35;
    windows.forEach(w => {
      const diff = Math.abs(h - w.hour), range = w.type === 'Major' ? 2 : 1;
      if (diff < range) a += w.type === 'Major' ? 35 : 20;
    });
    return { h, a: Math.min(100, a) };
  });
}

// ── Haversine distance (miles) ────────────────────────────────────────────────
function haversine(a, b, c, d) {
  const R = 3959, dL = (c-a)*Math.PI/180, dO = (d-b)*Math.PI/180;
  const x = Math.sin(dL/2)**2 + Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dO/2)**2;
  return Math.round(R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1-x)) * 10) / 10;
}

// ── Weather icon ──────────────────────────────────────────────────────────────
function wxIcon(c) {
  if (c === 0) return '☀️';
  if (c <= 2)  return '⛅';
  if (c <= 3)  return '☁️';
  if (c <= 48) return '🌫️';
  if (c <= 67) return '🌧️';
  if (c <= 77) return '🌨️';
  if (c <= 82) return '🌦️';
  return '⛈️';
}

// ── Geocoding ─────────────────────────────────────────────────────────────────
// US zip codes: Zippopotam.us — purpose-built, always correct, CORS-enabled, no key
// City names: Open-Meteo geocoding, US results prioritized
async function geocode(q) {
  q = q.trim();
  const isZip = /^\d{5}$/.test(q);

  if (isZip) {
    const res = await fetch(`https://api.zippopotam.us/us/${q}`);
    if (!res.ok) throw new Error(`Zip code ${q} not found — double-check it`);
    const text = await res.text();
    let data;
    try { data = JSON.parse(text); } catch { throw new Error(`Zip code ${q} not found — double-check it`); }
    if (!data.places || !data.places.length) throw new Error(`No location found for zip ${q}`);
    const place = data.places[0];
    return {
      lat:  parseFloat(place.latitude),
      lon:  parseFloat(place.longitude),
      name: `${place['place name']}, ${place['state abbreviation']}`,
    };
  }

  const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=10&language=en&format=json`);
  const data = await res.json();
  if (!data.results || !data.results.length) throw new Error('Location not found — try "City, ST" format');
  const r = data.results.find(x => x.country_code === 'US') || data.results[0];
  return { lat: r.latitude, lon: r.longitude, name: `${r.name}, ${r.admin1 || r.country}` };
}

// ── Weather fetch ─────────────────────────────────────────────────────────────
async function fetchWeather(lat, lon) {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=weathercode,temperature_2m_max,windspeed_10m_max&temperature_unit=fahrenheit&forecast_days=7&timezone=auto`;
  const res = await fetch(url);
  return res.json();
}

// ── Pinned lakes — always show regardless of NHD name ────────────────────────
// Add any lake here that NHD misses or names differently from what locals use.
// coords: approximate center of the lake
const PINNED_LAKES = [
  { name: 'High Point City Lake', lat: 35.9397, lon: -80.0283, type: 'lake / pond' },
];

// ── Lakes via USGS National Hydrography Dataset (NHD) ────────────────────────
// Layer 12 = Waterbody Large Scale | FTYPE 390=LakePond, 436=Reservoir, 361=PluvialLake
// Note: returnCentroid is NOT supported on this layer — we fetch geometry envelope
// and compute center from xmin/xmax/ymin/ymax ourselves.
async function fetchLakes(lat, lon) {
  const BASE = 'https://hydro.nationalmap.gov/arcgis/rest/services/nhd/MapServer/12/query';
  const deg = 0.7; // ~48mi bbox

  // Always start with pinned lakes within range
  const seen = new Set();
  const pinned = PINNED_LAKES
    .map(p => ({ ...p, dist: haversine(lat, lon, p.lat, p.lon) }))
    .filter(p => p.dist <= 48);
  pinned.forEach(p => seen.add(p.name));

  const tryQuery = async (where) => {
    const bbox = `${lon-deg},${lat-deg},${lon+deg},${lat+deg}`;
    const p = new URLSearchParams({
      where, geometry: bbox, geometryType: 'esriGeometryEnvelope',
      inSR: '4326', outSR: '4326', spatialRel: 'esriSpatialRelIntersects',
      outFields: 'GNIS_NAME,FTYPE,FCODE', returnGeometry: 'true',
      resultRecordCount: '60', f: 'json',
    });
    try {
      const res = await fetch(`${BASE}?${p}`, { signal: AbortSignal.timeout(12000) });
      if (!res.ok) return [];
      const text = await res.text();
      if (!text.trim().startsWith('{')) return [];
      const data = JSON.parse(text);
      return data.features || [];
    } catch { return []; }
  };

  // Try with FTYPE filter first, then fall back to just GNIS_NAME if empty
  let features = await tryQuery("GNIS_NAME <> '' AND FTYPE IN (390, 436, 378, 361)");
  if (!features.length) features = await tryQuery("GNIS_NAME <> ''");

  const nhd = features
    .filter(f => f.attributes.GNIS_NAME && f.geometry)
    .map(f => {
      const name = f.attributes.GNIS_NAME;
      let allX = [], allY = [];
      (f.geometry.rings || []).forEach(ring => ring.forEach(([x, y]) => { allX.push(x); allY.push(y); }));
      if (!allX.length) return null;
      const clon = (Math.min(...allX) + Math.max(...allX)) / 2;
      const clat = (Math.min(...allY) + Math.max(...allY)) / 2;
      const ftype = f.attributes.FTYPE;
      const type = (ftype === 436 || ftype === 378) ? 'reservoir' : ftype === 361 ? 'pluvial lake' : 'lake / pond';
      return { name, lat: clat, lon: clon, dist: haversine(lat, lon, clat, clon), type };
    })
    .filter(Boolean)
    .filter(e => { if (seen.has(e.name)) return false; seen.add(e.name); return true; });

  return [...pinned, ...nhd].sort((a, b) => a.dist - b.dist).slice(0, 10);
}

// ── iNaturalist fish species for a location ───────────────────────────────────
// Uses /observations/species_counts — one call, deduped species with counts + photos
async function fetchInatFish(lat, lon, radiusKm = 8) {
  const url = `https://api.inaturalist.org/v1/observations/species_counts`
    + `?lat=${lat}&lng=${lon}&radius=${radiusKm}`
    + `&iconic_taxa=Actinopterygii`   // all ray-finned fish
    + `&quality_grade=research`       // community-verified only
    + `&per_page=15`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`iNat ${res.status}`);
  const data = await res.json();
  return (data.results || []).map(r => ({
    common: r.taxon.preferred_common_name || r.taxon.name,
    sci:    r.taxon.name,
    count:  r.count,
    photo:  r.taxon.default_photo ? r.taxon.default_photo.square_url : null,
    inatId: r.taxon.id,
  }));
}

// ── Toggle iNat fish panel for a lake card ────────────────────────────────────
async function toggleFish(lakeIdx) {
  const toggle  = document.getElementById(`ft-${lakeIdx}`);
  const list    = document.getElementById(`fl-${lakeIdx}`);
  const isOpen  = list.classList.contains('open');

  // Close if already open
  if (isOpen) {
    list.classList.remove('open');
    toggle.classList.remove('open');
    return;
  }

  // Open and load if not yet loaded
  toggle.classList.add('open');
  list.classList.add('open');

  if (list.dataset.loaded) return; // already fetched
  list.dataset.loaded = 'true';

  const { lat, lon } = appData.lakes[lakeIdx];
  list.innerHTML = `<div class="inat-loading">Loading real fish sightings…</div>`;

  try {
    const fish = await fetchInatFish(lat, lon);
    if (fish.length >= 3) {
      // Real iNat data
      let h = fish.map(f => `
        <div class="inat-fish-row">
          ${f.photo
            ? `<img class="inat-fish-photo" src="${f.photo}" alt="${f.common}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
            : ''}
          <div class="inat-fish-photo-placeholder" style="${f.photo ? 'display:none' : ''}">🐟</div>
          <div class="inat-fish-info">
            <div class="inat-fish-common">${f.common}</div>
            <div class="inat-fish-sci">${f.sci}</div>
          </div>
          <div class="inat-fish-count">${f.count} obs</div>
        </div>`).join('');
      h += `<div class="inat-source">Sightings via <a href="https://www.inaturalist.org" target="_blank">iNaturalist</a></div>`;
      list.innerHTML = h;
    } else {
      // Sparse — fall back to regional model
      renderFallbackFish(list, lakeIdx);
    }
  } catch (e) {
    renderFallbackFish(list, lakeIdx);
  }
}

function renderFallbackFish(container, lakeIdx) {
  const d = appData.days[selectedDay];
  let h = d.fish.map(f => {
    const pct = Math.round(f.rate * 100);
    return `
      <div class="inat-fish-row">
        <div class="inat-fish-photo-placeholder">🐟</div>
        <div class="inat-fish-info">
          <div class="inat-fish-common">${f.name}</div>
          <div class="inat-fish-sci">Est. activity</div>
        </div>
        <div class="inat-fish-count">${pct}%</div>
      </div>`;
  }).join('');

  // Hours of operation — find today's block
  const hoursRow = (() => {
    const h = data.hours;
    const cd = data.closedDays || [];
    if (!h || !h.length) return '';
    const now  = new Date();
    const dow  = now.getDay();
    const md   = now.getMonth()+1;
    const dd   = now.getDate();
    const DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

    if (cd.includes(dow)) {
      return `<div class="db-row db-hours-closed">🔴 Closed today (${DAY_NAMES[dow]}s)</div>`;
    }

    const parseDate = str => {
      if (!str) return null;
      const parts = str.split(' ');
      const m = MONTHS.indexOf(parts[0]) + 1;
      const d = parseInt(parts[1]);
      return { m, d };
    };

    const inRange = (from, to) => {
      if (!from || !to) return true; // year-round
      const f = parseDate(from), t = parseDate(to);
      if (!f || !t) return true;
      const cur  = md * 100 + dd;
      const fVal = f.m * 100 + f.d;
      const tVal = t.m * 100 + t.d;
      return fVal <= tVal ? cur >= fVal && cur <= tVal : cur >= fVal || cur <= tVal;
    };

    const block = h.find(b => inRange(b.from, b.to));
    if (!block) return '';
    if (block.closed) {
      return `<div class="db-row db-hours-closed">🔴 Closed${block.from ? ` (${block.from} – ${block.to})` : ''}</div>`;
    }

    const nowMins = now.getHours()*60 + now.getMinutes();
    const toMins = t => { const [time, ap] = t.split(' '); let [h,m] = time.split(':').map(Number); if(ap==='PM'&&h!==12)h+=12; if(ap==='AM'&&h===12)h=0; return h*60+m; };
    const openMins  = toMins(block.open);
    const closeMins = toMins(block.close);
    const isOpen    = nowMins >= openMins && nowMins < closeMins;
    const badge     = isOpen ? '🟢' : '🔴';
    const rangeStr  = block.from ? ` (${block.from} – ${block.to})` : '';
    return `<div class="db-row">${badge} ${block.open} – ${block.close}${rangeStr}${block.note ? ' · '+block.note : ''}</div>`;
  })();
  h += `<div class="inat-fallback-note">No local sightings data — showing regional estimates</div>`;
  container.innerHTML = h;
}

// ── App state ─────────────────────────────────────────────────────────────────
let appData = null;
let selectedDay = 0;

// ── Load all data ─────────────────────────────────────────────────────────────
// Weather loads first and renders immediately — lakes load in background
async function loadData(lat, lon, locName) {
  document.getElementById('locIn').value = locName;
  setContent('<div class="loading"><div class="spinner"></div>Loading fishing data…</div>');
  try {
    const wx = await fetchWeather(lat, lon);
    const DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const days = Array.from({ length: 7 }, (_, i) => {
      const date = new Date(); date.setDate(date.getDate() + i);
      const moon  = moonPhase(date);
      const wc    = wx.daily.weathercode[i];
      const wind  = wx.daily.windspeed_10m_max[i];
      const tempF = wx.daily.temperature_2m_max[i];
      const sc    = calcScore(date, wc, wind, moon);
      const sol   = solunarWindows(lat, lon, date);
      const sun   = sunTimes(lat, lon, date);
      return {
        date, sc, wc, moon, sol,
        name:  i === 0 ? 'Today' : i === 1 ? 'Tomorrow' : DAY_NAMES[date.getDay()],
        hours: hourlyActivity(sol, sun.rise, sun.set),
        fish:  fishRates(date.getMonth() + 1, tempF, wc, sc),
        crowd: crowdEstimate(sc, date.getDay(), wc),
        tempF: Math.round(tempF),
        wind:  Math.round(wind),
      };
    });
    // Render weather/solunar immediately — don't wait on lakes
    appData = { days, lakes: [], locName };
    selectedDay = 0;
    render();
    // Fetch lakes in background, patch in when ready
    fetchLakes(lat, lon).then(lakes => {
      if (appData) {
        appData.lakes = lakes;
        renderLakes();
      }
    }).catch(() => {}); // silent fail — lakes section already shows empty state
  } catch (e) {
    setContent(`<div class="err-msg">⚠️ ${e.message}. Check your connection and try again.</div>`);
  }
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const { days, lakes } = appData;
  const d = days[selectedDay];
  const lbl = scoreLabel(d.sc);
  let h = '';

  // Day strip
  h += `<div class="section-label">7-day solunar forecast</div><div class="day-scroll-wrap"><div class="day-scroll">`;
  days.forEach((day, i) => {
    const l = scoreLabel(day.sc);
    h += `<div class="day-card${i===selectedDay?' active':''}" onclick="selectDay(${i})">
      <div class="day-name">${day.name}</div>
      <div class="day-score">${day.sc}</div>
      <div class="day-lbl lbl-${l}">${l}</div>
    </div>`;
  });
  h += `</div></div>`; // close day-scroll + day-scroll-wrap

  // Solunar + moon + weather
  h += `<div class="card"><div class="card-title">Solunar windows — ${d.name}</div>
    <div class="sol-grid">`;
  d.sol.forEach(s => {
    h += `<div class="sol-item">
      <div class="sol-type">${s.type} period</div>
      <div class="sol-time">${s.time}</div>
      <div class="sol-dur">${s.dur}</div>
    </div>`;
  });
  h += `</div>
    <div class="moon-row">
      <div class="moon-em">${d.moon.icon}</div>
      <div>
        <div class="moon-name">${d.moon.name}</div>
        <div class="moon-illum">${d.moon.illum}% illuminated</div>
      </div>
    </div>
    <div class="wx-row">
      <div class="wx-chip"><div class="wx-val" style="font-size:22px">${wxIcon(d.wc)}</div><div class="wx-lbl">conditions</div></div>
      <div class="wx-chip"><div class="wx-val">${d.tempF}°F</div><div class="wx-lbl">high</div></div>
      <div class="wx-chip"><div class="wx-val">${d.wind}</div><div class="wx-lbl">mph wind</div></div>
    </div>
  </div>`;

  // Hourly activity
  h += `<div class="card"><div class="card-title">Hourly bite activity</div>`;
  d.hours.forEach(({ h: hr, a }) => {
    const t = hr > 12 ? `${hr-12}pm` : hr === 12 ? '12pm' : `${hr}am`;
    const color = a >= 70 ? '#1D9E75' : a >= 45 ? '#639922' : '#B4B2A9';
    h += `<div class="hour-row">
      <span class="hour-time">${t}</span>
      <div class="hbar-track"><div class="hbar-fill" style="width:${a}%;background:${color}"></div></div>
      <span class="hour-pk">${a >= 70 ? 'peak' : ''}</span>
    </div>`;
  });
  h += `</div>`;

  // Fish rates
  h += `<div class="card"><div class="card-title">Fish activity &amp; catch rates</div><div class="fish-grid">`;
  d.fish.forEach(f => {
    const pct = Math.round(f.rate * 100);
    h += `<div class="fish-card">
      <div class="fish-name">${f.name}</div>
      <div class="fish-sub">Est. catch rate</div>
      <div class="fish-track"><div class="fish-fill" style="width:${pct}%"></div></div>
      <div class="fish-pct">${pct}%</div>
    </div>`;
  });
  h += `</div></div>`;

  // Nearby lakes — placeholder; filled by renderLakes() after background fetch
  h += `<div class="section-label">Nearby lakes &amp; water</div>`;
  h += `<div id="lakes-section"><div class="loading" style="padding:20px 0"><div class="spinner"></div>Finding nearby lakes…</div></div>`;

  setContent(h);
  requestAnimationFrame(initScrollFades);
}

function selectDay(i) { selectedDay = i; render(); }
function setContent(html) { document.getElementById('content').innerHTML = html; }

// ── Day scroll fade indicators ────────────────────────────────────────────────
function initScrollFades() {
  const wrap = document.querySelector('.day-scroll-wrap');
  const scroll = document.querySelector('.day-scroll');
  if (!wrap || !scroll) return;

  function update() {
    const atStart = scroll.scrollLeft <= 2;
    const atEnd   = scroll.scrollLeft + scroll.clientWidth >= scroll.scrollWidth - 2;
    wrap.classList.toggle('fade-left',  !atStart);
    wrap.classList.toggle('fade-right', !atEnd);
  }

  scroll.addEventListener('scroll', update, { passive: true });
  // Run once after paint so scrollWidth is available
  requestAnimationFrame(update);
}

// ── Lake DB helpers ───────────────────────────────────────────────────────────
function lakeDBCard(lakeName) {
  const entry = lakeDB[lakeName];
  if (!entry) return lakeDBSubmitForm(lakeName, false);

  const data       = entry.confirmed || entry.pending;
  const isConfirmed = !!entry.confirmed;
  const hasPending  = !!entry.pending && !!entry.confirmed;

  const payLabel  = data.payToFish === true  ? '💰 Pay to fish'
                  : data.payToFish === false ? '🆓 Free to fish'
                  : '❓ Pay status unknown';
  const rulesLabel = data.catchRules === 'catch-and-release' ? '🔄 Catch & release only'
                   : data.catchRules === 'catch-and-keep'    ? '🎣 Catch & keep allowed'
                   : data.catchRules === 'slot-limits'       ? '📏 Slot limits apply'
                   : '❓ Rules unknown';
  const accessLabel = data.accessType === 'public' ? '🌐 Public access'
                    : data.accessType === 'private' ? '🔒 Private'
                    : data.accessType === 'park'    ? '🏕️ Park / managed area'
                    : '❓ Access unknown';

  // Bank fishing
  const bankRow = data.bankFishing !== undefined ? (() => {
    if (!data.bankFishing) return '<div class="db-row">🚫 No bank / pier fishing</div>';
    const pier = data.pier ? ' · 🪝 Pier available' : '';
    const prices = (data.bankPrices || []).map(p => `$${p.price}/${p.per}`).join(' or ');
    return `<div class="db-row">🎣 Bank fishing available${pier}${prices ? ' — ' + prices : ' — free'}</div>`;
  })() : '';

  // Boat launch
  const launchRow = data.boatLaunch !== undefined ? (() => {
    if (!data.boatLaunch) return '<div class="db-row">🚫 No boat launch</div>';
    const prices = (data.launchPrices || []).map(p => `$${p.price}/${p.per}`).join(' or ');
    return `<div class="db-row">🚢 Boat launch${prices ? ' — ' + prices : ' — free'}</div>`;
  })() : '';

  const rentalRows = (data.boatRentals || []).map(r => {
    const icon = r.type === 'kayak' ? '🛶' : r.type === 'motorized' ? '⛵' : '🚣';
    return `<div class="db-row">${icon} ${r.type.charAt(0).toUpperCase()+r.type.slice(1)} rental — $${r.price}/${r.per}</div>`;
  }).join('');

  const alias = data.localName ? data.localName : null;

  const badge = isConfirmed
    ? `<span class="db-badge db-confirmed">✓ Verified</span>`
    : `<span class="db-badge db-unconfirmed">community</span>`;

  const pendingSection = hasPending ? `
    <div class="db-pending-notice">
      🔔 Update pending · ${entry.pending.voteCount}/10 votes
      <button class="db-vote-btn" onclick="voteOnLake('${lakeName.replace(/'/g,"\'")}', this)">Vote it's accurate</button>
    </div>` : '';

  return `<div class="db-card">
    <div class="db-card-header">${badge} Community info</div>
    <div class="db-row">${accessLabel}</div>
    <div class="db-row">${payLabel}</div>
    <div class="db-row">${rulesLabel}</div>
    ${hoursRow}
    ${bankRow}
    ${launchRow}
    ${rentalRows}
    ${data.notes ? `<div class="db-notes">${data.notes}</div>` : ''}
    <div class="db-meta">Submitted by ${data.submittedBy || 'anonymous'} · ${data.submittedAt || ''}</div>
    ${pendingSection}
    <button class="db-edit-btn" onclick="toggleSubmitForm('${lakeName.replace(/'/g,"\'")}', this)">Suggest an update</button>
  </div>
  <div class="db-form-wrap" id="form-${lakeName.replace(/[^a-z0-9]/gi,'_')}"></div>`;
}

function getHoursList(id) {
  return Array.from(document.querySelectorAll('#hours-list-'+id+' .db-hours-row')).map(row => {
    const isClosed = row.querySelector('.hours-closed-cb').checked;
    const fromMonth = row.querySelector('.hours-from-month')?.value;
    const fromDay   = row.querySelector('.hours-from-day')?.value;
    const toMonth   = row.querySelector('.hours-to-month')?.value;
    const toDay     = row.querySelector('.hours-to-day')?.value;
    const note      = row.querySelector('.hours-note')?.value || '';
    const hasRange  = fromMonth && toMonth;
    const block = {
      closed: isClosed,
      note: note || undefined,
      from: hasRange ? `${MONTHS[fromMonth-1]} ${fromDay}` : undefined,
      to:   hasRange ? `${MONTHS[toMonth-1]} ${toDay}`   : undefined,
    };
    if (!isClosed) {
      const openVal  = row.querySelector('.hours-open')?.value  || '07:00';
      const closeVal = row.querySelector('.hours-close')?.value || '19:00';
      block.open  = fmtTime(openVal);
      block.close = fmtTime(closeVal);
    }
    return block;
  });
}

function getClosedDays(id) {
  if (!document.getElementById('closed-days-toggle-'+id)?.checked) return [];
  return Array.from(document.querySelectorAll('.closed-day-cb-'+id+':checked')).map(cb => parseInt(cb.value));
}

function fmtTime(t) {
  const [h, m] = t.split(':').map(Number);
  const ap = h >= 12 ? 'PM' : 'AM';
  const hr = h > 12 ? h-12 : h === 0 ? 12 : h;
  return `${hr}:${String(m).padStart(2,'0')} ${ap}`;
}

async function submitLakeInfo(lakeName, id, btn) {
  const payToFish   = document.getElementById('ptf-'+id).value;
  const accessType  = document.getElementById('act-'+id).value;
  const catchRules  = document.getElementById('crs-'+id).value;
  const localName   = document.getElementById('lnm-'+id).value;
  const notes       = document.getElementById('nts-'+id).value;
  const submittedBy = document.getElementById('sub-'+id).value;
  const status      = document.getElementById('fst-'+id);
  const hours       = getHoursList(id);
  const closedDays  = getClosedDays(id);

  const bankFishing  = document.getElementById('bnk-'+id)?.value;
  const pier         = document.getElementById('pier-'+id)?.checked || false;
  const bankPrices   = bankFishing === 'true' ? getPriceList('bnk-price-list-'+id) : [];
  const boatLaunch   = document.getElementById('lnch-'+id)?.value;
  const launchPrices = boatLaunch === 'true' ? getPriceList('lnch-price-list-'+id) : [];
  const boatRentals  = getRentalList(id);

  if (!payToFish || !accessType || !catchRules) { status.textContent = '⚠️ Please fill in access type, pay status, and catch rules.'; return; }

  btn.disabled = true;
  btn.textContent = 'Submitting…';
  status.textContent = '';

  try {
    const res = await fetch(`${WORKER_URL}/submit`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        lakeName, accessType, localName,
        payToFish: payToFish === 'true', catchRules,
        bankFishing: bankFishing !== '' ? bankFishing === 'true' : undefined,
        pier, bankPrices,
        boatLaunch: boatLaunch !== '' ? boatLaunch === 'true' : undefined,
        launchPrices, boatRentals,
        hours, closedDays,
        notes, submittedBy,
      }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Submit failed');

    // Update local cache so UI reflects immediately
    if (!lakeDB[lakeName]) lakeDB[lakeName] = {};
    const entry = {
      accessType, localName,
      payToFish: payToFish === 'true', catchRules,
      bankFishing: bankFishing !== '' ? bankFishing === 'true' : undefined,
      pier, bankPrices, boatLaunch: boatLaunch !== '' ? boatLaunch === 'true' : undefined,
      launchPrices, boatRentals,
      hours, closedDays,
      notes, submittedBy: submittedBy || 'anonymous',
                    submittedAt: new Date().toISOString().slice(0,10), voteCount: 0, votes: [] };
    if (lakeDB[lakeName].confirmed) {
      lakeDB[lakeName].pending = entry;
    } else {
      lakeDB[lakeName] = { confirmed: null, pending: entry };
    }

    // Re-render lakes
    renderLakes();
    status.textContent = '✅ Submitted! Thanks for contributing.';
  } catch (e) {
    btn.disabled = false;
    btn.textContent = 'Submit';
    status.textContent = '⚠️ ' + e.message;
  }
}

async function voteOnLake(lakeName, btn) {
  btn.disabled = true;
  btn.textContent = 'Voting…';
  try {
    const res  = await fetch(`${WORKER_URL}/vote`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ lakeName }),
    });
    const data = await res.json();
    if (data.status === 'already_voted') { btn.textContent = 'Already voted'; return; }
    if (data.status === 'auto_confirmed') {
      if (lakeDB[lakeName]) {
        lakeDB[lakeName].confirmed = lakeDB[lakeName].pending;
        lakeDB[lakeName].confirmed.confirmedBy = 'community';
        lakeDB[lakeName].pending = null;
      }
      renderLakes();
      return;
    }
    if (lakeDB[lakeName] && lakeDB[lakeName].pending) {
      lakeDB[lakeName].pending.voteCount = data.voteCount;
    }
    btn.textContent = `Voted (${data.voteCount}/10)`;
  } catch {
    btn.disabled = false;
    btn.textContent = 'Vote it\'s accurate';
  }
}

  navigator.geolocation.getCurrentPosition(
    pos => loadData(pos.coords.latitude, pos.coords.longitude, 'Your location'),
    ()  => alert('Could not get GPS location. Try typing your city instead.')
  );
});

document.getElementById('locIn').addEventListener('keydown', async e => {
  if (e.key !== 'Enter') return;
  const v = e.target.value.trim();
  if (!v) return;
  try {
    const { lat, lon, name } = await geocode(v);
    loadData(lat, lon, name);
  } catch (err) {
    setContent(`<div class="err-msg">⚠️ ${err.message}. Try a city and state like "Nashville, TN" or a 5-digit zip code.</div>`);
  }
});

// ── Load lake DB in background on startup ────────────────────────────────────
loadLakeDB();

// ── Auto-load with GPS, no hardcoded fallback ─────────────────────────────────
if (navigator.geolocation) {
  navigator.geolocation.getCurrentPosition(
    pos => loadData(pos.coords.latitude, pos.coords.longitude, 'Your location'),
    ()  => setContent('<div class="empty" style="padding:40px 20px;font-size:14px">📍 Enter a city or zip above to get started</div>')
  );
} else {
  setContent('<div class="empty" style="padding:40px 20px;font-size:14px">📍 Enter a city or zip above to get started</div>');
}
</script>
</body>
</html>
