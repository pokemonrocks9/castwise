name: Build APK

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'manifest.json'
      - 'twa-manifest.json'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Configure Bubblewrap SDK paths (no prompts)
        run: |
          bubblewrap updateConfig \
            --jdkPath "$JAVA_HOME" \
            --androidSdkPath "$ANDROID_SDK_ROOT"

      - name: Copy twa-manifest to build dir
        run: |
          mkdir -p twa-build
          cp twa-manifest.json twa-build/twa-manifest.json

      - name: Restore keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > castwise.keystore

      - name: Build APK (skip init — use existing twa-manifest.json)
        working-directory: ./twa-build
        run: |
          bubblewrap build \
            --manifest ./twa-manifest.json \
            --ks "${{ github.workspace }}/castwise.keystore" \
            --ksPass "${{ secrets.KEYSTORE_PASSWORD }}" \
            --ksKeyAlias "${{ secrets.KEY_ALIAS }}" \
            --ksKeyPass "${{ secrets.KEY_PASSWORD }}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: castwise-${{ github.sha }}
          path: twa-build/*.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: build-${{ github.run_number }}
          name: CastWise Build ${{ github.run_number }}
          body: |
            Auto-built APK from commit ${{ github.sha }}

            **To install:**
            1. Download `app-release-signed.apk` below
            2. On Android: Settings → Install unknown apps → allow your browser
            3. Open the APK and install
          files: twa-build/*.apk
          draft: false
          prerelease: true
