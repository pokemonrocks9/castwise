name: Build Android APK

on:
  push:
    branches:
      - main # Or the branch you deploy your PWA from
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # Updated to Node.js 20 for PWA Builder compatibility

    - name: "Debug: Check Java and Android SDK setup"
      run: |
        echo "JAVA_HOME: $JAVA_HOME"
        echo "ANDROID_HOME: $ANDROID_HOME"
        java -version
        sdkmanager --version || echo "sdkmanager not found or failed"
        which java || echo "java not found"
        which sdkmanager || echo "sdkmanager not found" # This will output the path if found
        # Ensure ANDROID_HOME is set for subsequent steps
        echo "ANDROID_HOME=${ANDROID_HOME}" >> $GITHUB_ENV
        # Install necessary Android SDK components if not already present.
        # The 'platforms;android-33' and 'build-tools;33.0.2' are common requirements.
        # Adjust versions as needed or based on pwabuilder's requirements.
        # Using yes | to accept licenses automatically.
        yes | sdkmanager --licenses
        sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2" "cmdline-tools;latest"
        # Add Android SDK tools to PATH for all subsequent steps
        echo "${ANDROID_HOME}/platform-tools" >> $GITHUB_PATH
        echo "${ANDROID_HOME}/cmdline-tools/latest/bin" >> $GITHUB_PATH
    - name: Install PWA Builder CLI and prepare environment
      run: | # Ensure global npm bin is in PATH for pwabuilder to be directly callable
        set -euxo pipefail # Exit on error, show commands, treat unset variables as error
        echo "Current PATH before npm install: $PATH"
        npm --version # Debug npm version
        # Get the npm global prefix and add its bin directory to PATH
        NPM_GLOBAL_BIN_DIR=$(npm config get prefix)/bin
        echo "NPM global bin directory: $NPM_GLOBAL_BIN_DIR"
        echo "Adding $NPM_GLOBAL_BIN_DIR to GITHUB_PATH"
        echo "$NPM_GLOBAL_BIN_DIR" >> $GITHUB_PATH
        # Install the correct pwabuilder CLI globally
        npm install -g pwabuilder
        # Verify installation by listing contents of the global bin directory
        echo "Listing contents of $NPM_GLOBAL_BIN_DIR:"
        ls -l "$NPM_GLOBAL_BIN_DIR" || echo "Global bin directory not found or empty."

    - name: "Debug: Verify pwabuilder is in PATH"
      run: |
        set -euxo pipefail
        echo "PATH in new step: $PATH"
        which pwabuilder # Confirm pwabuilder is found in PATH

    - name: Generate Android APK using PWA Builder CLI
      run: |
        set -euxo pipefail # Exit on error, show commands, treat unset variables as error
        echo "Current working directory: $(pwd)"
        echo "Attempting to build PWA from URL: ${{ secrets.PWA_URL }}"
        # Ensure the base output directory exists. PWA Builder should create it, but this is a safeguard.
        mkdir -p build/android
        # Call pwabuilder directly, assuming it's now in PATH from global install
        pwabuilder ${{ secrets.PWA_URL }} --platforms android --output build/android --verbose
        echo "--- Listing contents of current directory after pwabuilder ---"
        ls -la
        echo "--- Listing contents of build/android/ after pwabuilder command ---"
        ls -R build/android/ || echo "Directory build/android is still empty or not found after pwabuilder."

    - name: "Debug: List PWA Builder output directories"
      run: |
        echo "--- Listing contents of build/android/ ---"
        ls -R build/android/ || echo "Directory build/android not found or empty."
        echo "--- Attempting to list contents of build/android/android/app/build/outputs/apk/ (common PWA Builder path) ---"
        ls -R build/android/android/app/build/outputs/apk/ || echo "Directory build/android/android/app/build/outputs/apk/ not found or empty."
        echo "--- Attempting to list contents of build/android/twa/app/build/outputs/apk/ (another common PWA Builder path) ---"
        ls -R build/android/twa/app/build/outputs/apk/ || echo "Directory build/android/twa/app/build/outputs/apk/ not found or empty."
        echo "--- Attempting to list contents of build/android/platforms/android/app/build/outputs/apk/ (original path) ---"
        ls -R build/android/platforms/android/app/build/outputs/apk/ || echo "Directory build/android/platforms/android/app/build/outputs/apk/ not found or empty."

    - name: Upload Android APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: build/android/**/*.apk # More general path to find any generated APK within build/android
