name: Build Android APK

on:
  push:
    branches:
      - main # Or the branch you deploy your PWA from
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    # Grant the GITHUB_TOKEN permission to create releases and tags
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # Updated to Node.js 20 for PWA Builder compatibility

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17' # Modern Android SDK tools require Java 17+

    - name: Set up Android SDK
      uses: android-actions/setup-android@v2

    - name: Install PWA Builder CLI and prepare environment
      run: | # Ensure global npm bin is in PATH for pwabuilder to be directly callable
        set -euxo pipefail # Exit on error, show commands, treat unset variables as error
        echo "Current PATH before npm install: $PATH"
        npm --version # Debug npm version
        # Get the npm global prefix and add its bin directory to PATH
        NPM_GLOBAL_BIN_DIR=$(npm config get prefix)/bin
        echo "NPM global bin directory: $NPM_GLOBAL_BIN_DIR"
        echo "Adding $NPM_GLOBAL_BIN_DIR to GITHUB_PATH"
        echo "$NPM_GLOBAL_BIN_DIR" >> $GITHUB_PATH
        # Install the correct pwabuilder CLI globally
        npm install -g pwabuilder
        # Verify installation by listing contents of the global bin directory
        echo "Listing contents of $NPM_GLOBAL_BIN_DIR:"
        ls -l "$NPM_GLOBAL_BIN_DIR" || echo "Global bin directory not found or empty."

    - name: Generate Android APK using PWA Builder CLI
      run: |
        set -euxo pipefail
        echo "Attempting to build PWA from URL: ${{ secrets.PWA_URL }}"
        # Call pwabuilder directly (it will generate the CastWise folder)
        pwabuilder ${{ secrets.PWA_URL }} --platforms android

    - name: Downgrade to Java 8 for Gradle build
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '8' # Gradle 4.6 generated by PWA Builder requires Java 8

    - name: Build APK with Gradle
      run: |
        cd CastWise/android/source
        # Fix Windows line endings (CRLF -> LF) generated by pwabuilder
        sed -i 's/\r$//' gradlew
        # Android resource names cannot start with numbers. Remove invalid icons generated by pwabuilder.
        find app/src/main/res -type f -name "[0-9]*.png" -delete
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Extract version from sw.js
      run: |
        # Grab the text between the quotes on the 'const VERSION' line
        APP_VERSION=$(awk -F"'" '/const VERSION/ {print $2}' sw.js)
        echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV
        echo "Extracted version: $APP_VERSION"

    - name: Rename APK for Release
      run: |
        # Pull the APK out of the deeply nested build folder and rename it beautifully
        mv CastWise/android/source/app/build/outputs/apk/debug/app-debug.apk CastWise-${{ env.APP_VERSION }}.apk

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.APP_VERSION }}
        name: Release ${{ env.APP_VERSION }}
        files: CastWise-${{ env.APP_VERSION }}.apk
        body: "Automated Android APK build for CastWise version ${{ env.APP_VERSION }}."

    - name: Upload Android APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: CastWise-${{ env.APP_VERSION }}.apk
