name: Build Android APK

on:
  push:
    branches:
      - main # Or the branch you deploy your PWA from
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18' # Use a Node.js version compatible with PWA Builder

    - name: Install PWA Builder CLI
      run: npm install -g @pwabuilder/cli

    - name: Generate Android APK using PWA Builder CLI
      run: pwabuilder --url ${{ secrets.PWA_URL }} --platform android --output build/android
      with:
        # The PWA Builder CLI requires the URL to be passed directly in the run command.
        # It's highly recommended to store your PWA URL as a GitHub Secret for security.
        # For now, I've used a placeholder `secrets.PWA_URL`.
        # If you prefer, you can hardcode it back to 'https://pokemonrocks9.github.io/castwise/'
        # but using secrets is a best practice.
        # The output path is also handled directly by the CLI command.
        # No 'uses' keyword here as we're running a shell command.

    - name: Upload Android APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: build/android/*.apk # Adjust path if PWA Builder outputs a different file name/structure
