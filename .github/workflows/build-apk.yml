name: Build Android APK

on:
  push:
    branches:
      - main # Or the branch you deploy your PWA from
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18' # Use a Node.js version compatible with PWA Builder

    - name: Generate Android APK using PWA Builder
      uses: pwa-builder/pwabuilder-action@v2 # Corrected action name
      with:
        url: 'https://pokemonrocks9.github.io/castwise/' # IMPORTANT: Replace with your actual deployed PWA URL
        platforms: 'android'
        output-path: 'build/android' # Directory to save the generated APK

    - name: Upload Android APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: build/android/*.apk # Adjust path if PWA Builder outputs a different file name/structure
