name: Build APK

on:
  push:
    branches: [main]
    paths:
      - 'index.html'      # only rebuild when the app actually changes
      - 'manifest.json'
      - 'twa-manifest.json'
  workflow_dispatch:       # also allow manual trigger from Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Restore keystore from secret
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > castwise.keystore

      - name: Initialize Bubblewrap project
        run: |
          bubblewrap init --manifest https://pokemonrocks9.github.io/castwise/manifest.json \
            --directory ./twa-build

      - name: Build APK
        working-directory: ./twa-build
        env:
          KEYSTORE_PATH: ../castwise.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: bubblewrap build

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: castwise-${{ github.sha }}
          path: twa-build/*.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: build-${{ github.run_number }}
          name: CastWise Build ${{ github.run_number }}
          body: |
            Auto-built APK from commit ${{ github.sha }}
            
            **Install:**
            1. Download `app-release-signed.apk` below
            2. On your Android device: Settings → Install unknown apps → allow your browser
            3. Open the downloaded APK and install
          files: twa-build/*.apk
          draft: false
          prerelease: true
