name: Build Android APK

on:
  push:
    branches:
      - main # Or the branch you deploy your PWA from
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # Updated to Node.js 20 for PWA Builder compatibility

    - name: Install PWA Builder CLI
      run: npm install -g @pwabuilder/cli

    - name: Generate Android APK using PWA Builder CLI
      run: npx pwabuilder --url ${{ secrets.PWA_URL }} --platform android --output build/android

    - name: Upload Android APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: build/android/*.apk # Adjust path if PWA Builder outputs a different file name/structure
