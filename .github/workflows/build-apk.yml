name: Build APK

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'manifest.json'
      - 'twa-manifest.json'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses
        run: yes | sdkmanager --licenses || true

      - name: Clone TWA template
        run: |
          git clone --depth 1 https://github.com/GoogleChromeLabs/svgomg-twa.git twa-build

      - name: Configure TWA for CastWise
        run: |
          cd twa-build
          cat > app/build.gradle << 'GRADLE'
          plugins {
              id 'com.android.application'
          }
          android {
              compileSdk 34
              defaultConfig {
                  applicationId "com.castwise.app"
                  minSdk 24
                  targetSdk 34
                  versionCode ${{ github.run_number }}
                  versionName "0.26.${{ github.run_number }}"
              }
              signingConfigs {
                  release {
                      storeFile file(System.getenv("KEYSTORE_PATH"))
                      storePassword System.getenv("KEYSTORE_PASSWORD")
                      keyAlias System.getenv("KEY_ALIAS")
                      keyPassword System.getenv("KEY_PASSWORD")
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled false
                  }
              }
          }
          dependencies {
              implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
          }
          GRADLE

          # Update TWA host config
          cat > app/src/main/res/values/strings.xml << 'XML'
          <resources>
              <string name="app_name">CastWise</string>
              <string name="launcher_name">CastWise</string>
              <string name="twa_package_name">com.castwise.app</string>
              <string name="asset_statements">[{"include": "https://pokemonrocks9.github.io/.well-known/assetlinks.json"}]</string>
              <string name="twa_url">https://pokemonrocks9.github.io/castwise/</string>
          </resources>
          XML

      - name: Restore keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > castwise.keystore

      - name: Build release APK
        working-directory: ./twa-build
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/castwise.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: castwise-${{ github.sha }}
          path: twa-build/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: CastWise Build ${{ github.run_number }}
          body: |
            Auto-built APK from commit ${{ github.sha }}

            **To install on Android:**
            1. Download `app-release.apk` below
            2. Settings → Install unknown apps → allow your browser
            3. Open the APK file and tap Install
          files: twa-build/app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: true
