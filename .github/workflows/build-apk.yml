name: Build Android APK

on:
  push:
    branches:
      - main # Or the branch you deploy your PWA from
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # Updated to Node.js 20 for PWA Builder compatibility

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17' # Modern Android SDK tools require Java 17+

    - name: Set up Android SDK
      uses: android-actions/setup-android@v2

    # NOTE: The sdkmanager --licenses command is often handled by setup-android,
    # but it's good practice to keep it if issues persist.
    # If you see license issues, add a step like: `run: yes | sdkmanager --licenses`
    - name: Install PWA Builder CLI and prepare environment
      run: | # Ensure global npm bin is in PATH for pwabuilder to be directly callable
        set -euxo pipefail # Exit on error, show commands, treat unset variables as error
        echo "Current PATH before npm install: $PATH"
        npm --version # Debug npm version
        # Get the npm global prefix and add its bin directory to PATH
        NPM_GLOBAL_BIN_DIR=$(npm config get prefix)/bin
        echo "NPM global bin directory: $NPM_GLOBAL_BIN_DIR"
        echo "Adding $NPM_GLOBAL_BIN_DIR to GITHUB_PATH"
        echo "$NPM_GLOBAL_BIN_DIR" >> $GITHUB_PATH
        # Install the correct pwabuilder CLI globally
        npm install -g pwabuilder
        # Verify installation by listing contents of the global bin directory
        echo "Listing contents of $NPM_GLOBAL_BIN_DIR:"
        ls -l "$NPM_GLOBAL_BIN_DIR" || echo "Global bin directory not found or empty."

    - name: "Debug: Verify pwabuilder is in PATH"
      run: |
        set -euxo pipefail
        echo "PATH in new step: $PATH"
        which pwabuilder # Confirm pwabuilder is found in PATH

    - name: Generate Android APK using PWA Builder CLI
      run: |
        set -euxo pipefail # Exit on error, show commands, treat unset variables as error
        echo "Current working directory: $(pwd)"
        echo "Attempting to build PWA from URL: ${{ secrets.PWA_URL }}"
        # Ensure the base output directory exists. PWA Builder should create it, but this is a safeguard.
        mkdir -p build/android
        # Call pwabuilder directly, assuming it's now in PATH from global install
        pwabuilder ${{ secrets.PWA_URL }} --platforms android --output build/android --verbose
        echo "--- Listing contents of current directory after pwabuilder ---"
        ls -la
        echo "--- Listing contents of build/android/ after pwabuilder command ---"
        ls -R build/android/ || echo "Directory build/android is still empty or not found after pwabuilder."

    - name: "Debug: List PWA Builder output directories"
      run: |
        echo "--- Look! A CastWise directory was created. Listing its contents: ---"
        ls -la CastWise/ || echo "CastWise directory not found."
        ls -R CastWise/ || echo "Cannot list CastWise recursively."
        echo "--- Searching for APK files anywhere in the workspace: ---"
        find . -name "*.apk"
        echo "--- Searching for Android build files (to see if we need to run Gradle manually): ---"
        find . -name "build.gradle"

    - name: Downgrade to Java 8 for Gradle build
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '8' # Gradle 4.6 generated by PWA Builder requires Java 8

    - name: Build APK with Gradle
      run: |
        cd CastWise/android/source
        # Fix Windows line endings (CRLF -> LF) generated by pwabuilder
        sed -i 's/\r$//' gradlew
        chmod +x gradlew
        ./gradlew assembleDebug
        echo "--- Build complete. APKs generated: ---"
        find app/build/outputs/apk -name "*.apk" || echo "No APK found in outputs."

    - name: Upload Android APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: CastWise/android/source/app/build/outputs/apk/**/*.apk
